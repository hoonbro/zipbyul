    steps:
      - uses: actions/checkout@v4
      # TODO: setup-python + pytest/ruff (collector/)

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
