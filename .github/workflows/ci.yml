# 모노레포 경로 필터 CI (인프라 8-3). 배포는 스택별 독립.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      collector: ${{ steps.filter.outputs.collector }}
      web: ${{ steps.filter.outputs.web }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api: ['api/**']
            collector: ['collector/**']
            web: ['web/**']
            db: ['db/**']

  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: gradlew test
        working-directory: api
        run: ./gradlew test --no-daemon

  collector:
    needs: changes
    if: ${{ needs.changes.outputs.collector == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install
        working-directory: collector
        run: pip install -e '.[dev]'
      - name: ruff
        working-directory: collector
        run: ruff check .
      - name: pytest
        working-directory: collector
        run: pytest -q

  db:
    needs: changes
    if: ${{ needs.changes.outputs.db == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jipbyul
          POSTGRES_USER: jipbyul
          POSTGRES_PASSWORD: jipbyul
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U jipbyul"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: flyway migrate (마이그레이션이 깨끗하게 적용되는지 검증)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/db/migration:/flyway/sql" \
            flyway/flyway:10 \
            -url=jdbc:postgresql://localhost:5432/jipbyul \
            -user=jipbyul -password=jipbyul -connectRetries=10 migrate

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
