spring:
  application:
    name: jipbyul-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:jipbyul}
    username: ${POSTGRES_USER:jipbyul}
    password: ${POSTGRES_PASSWORD:}
  # 스키마는 별도 flyway 컨테이너가 단일 관리한다. 앱은 마이그레이션을 실행하지 않는다.
  flyway:
    enabled: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

fcm:
  credentials-path: ${FCM_CREDENTIALS_JSON:}
  project-id: ${FCM_PROJECT_ID:}

# 표준 WebPush(VAPID) — iOS PWA용. 키 미설정 시 WebPush 발송 비활성.
webpush:
  vapid:
    public-key: ${WEBPUSH_VAPID_PUBLIC_KEY:}
    private-key: ${WEBPUSH_VAPID_PRIVATE_KEY:}
    subject: ${WEBPUSH_VAPID_SUBJECT:mailto:admin@example.com}

# /internal/* 보호용 토큰. 미설정 시 /internal/* 는 모두 403(fail-closed).
internal:
  api-token: ${INTERNAL_API_TOKEN:}

# 웹 PWA origin 허용(CORS). 콤마 구분.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

notification:
  consumer:
    enabled: ${NOTIFICATION_CONSUMER_ENABLED:true}
    batch-size: 100
    max-retry: 5
    poll-interval-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
