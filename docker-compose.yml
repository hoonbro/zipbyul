# 집별 MVP — 단일 호스트 Docker Compose (인프라 8-1)
# 두 컨테이너(api/collector), 한 DB(postgres). Python 쓰기 / Spring 읽기.
# 스키마 변경은 flyway 서비스로만 적용한 뒤 앱을 띄운다.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports: ["6379:6379"]

  # 스키마 SSOT — 앱 기동 전 마이그레이션 단일 적용
  flyway:
    image: flyway/flyway:10
    command: -connectRetries=10 migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes: ["./db/migration:/flyway/sql"]
    depends_on:
      postgres: { condition: service_healthy }

  # Spring — 서빙·비회원·알림 워커 (읽기)
  api:
    build: ./api
    env_file: [.env]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports: ["8080:8080"]
    volumes: ["./secrets:/run/secrets:ro"]
    depends_on:
      postgres: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }

  # web — Vite PWA 정적 서빙 + /v1 → api 리버스 프록시 (같은 origin, CORS 불필요)
  web:
    build:
      context: ./web
      args:
        # 공개값(클라 번들 노출 안전). .env에서 주입 → staging/prod 동일 이미지 재사용은 깨지지만 Firebase는 프로젝트 단위라 무방.
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    ports: ["8081:80"]
    depends_on: [api]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # admin — 운영자 콘솔(정적) + /internal 프록시. 로컬/내부 전용(공개 origin에 노출 안 함).
  admin:
    image: nginx:alpine
    ports: ["8082:80"]
    volumes:
      - ./admin/index.html:/usr/share/nginx/html/index.html:ro
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api]

  # Python — 공식 API 수집·정규화·base_score (쓰기)
  collector:
    build: ./collector
    env_file: [.env]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres: { condition: service_healthy }
      flyway: { condition: service_completed_successfully }

volumes:
  pgdata:
